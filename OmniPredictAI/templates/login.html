{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center py-lg-4">
        <div class="col-md-5">
            <div class="card bg-dark-card border-secondary-subtle p-4 rounded-4 shadow-lg">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-light mb-1">Welcome Back</h2>
                    <p class="text-secondary-custom">Log in to your OmniPredict AI dashboard</p>
                </div>
                
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label text-light">Email Address</label>
                        <input type="email" class="form-control bg-dark border-secondary-subtle text-light rounded-3 px-3 py-2" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label text-light">Password</label>
                        <input type="password" class="form-control bg-dark border-secondary-subtle text-light rounded-3 px-3 py-2" id="password" name="password" placeholder="Password" required>
                    </div>
                    <div class="mb-3 form-check d-flex justify-content-between align-items-center">
                        <div>
                            <input type="checkbox" class="form-check-input bg-dark border-secondary-subtle" id="remember" name="remember">
                            <label class="form-check-label text-secondary-custom small" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="text-gradient-primary small text-decoration-none">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-gradient-primary w-100 py-2.5 rounded-pill mb-3">Log In</button>
                </form>
                
                <div class="text-center mt-3">
                    <span class="text-secondary-custom small">Don't have an account? <a href="{{ url_for('register') }}" class="text-gradient-primary text-decoration-none">Register</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
